services:
  backend:
    build: ./backend
    restart: always
    ports:
      - "3001:3001"
    environment:
      - DATABASE_URL=file:./dev.db
      - JWT_SECRET=change_me_in_production
      - NODE_ENV=production
      - PORT=3001
      # Note: Google OAuth vars should be provided via .env
    volumes:
      - ./backend/prisma/dev.db:/app/prisma/dev.db
    env_file:
      - ./backend/.env

  frontend:
    build: ./frontend
    restart: always
    ports:
      - "80:80"
    depends_on:
      - backend
